    <link rel="stylesheet" href="style.css">
    <style>
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        .product-card {
            border: 1px solid #00311E;
            padding: 15px;
            text-align: center;
            background: rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-img-box {
            width: 100%;
            height: 280px;
            background-color: #fff;
            border: 1px solid #00311E;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            padding: 10px;
        }
        button {
            width: 100%;
            padding: 12px 0;
            background-color: #00311E;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #004d30;
        }
        
        .category-subtitle {
            margin-top: 50px;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #00311E;
            border-bottom: 2px solid #00311E;
            padding-bottom: 10px;
        }
    </style>
